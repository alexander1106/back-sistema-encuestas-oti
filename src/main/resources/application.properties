spring.application.name=sistema-encuestas

# CONFIGURACIÓN BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_encuestas?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=encuestas_user
spring.datasource.password=123456

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# PUERTO (opcional)
server.address=0.0.0.0
server.port=8080

# ENCODING UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true